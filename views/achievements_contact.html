<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achievements & Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & base styles */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Inter', Arial, sans-serif; background: #fff; }
    body { min-height: 100vh; }
    :focus-visible { outline: 2px solid #0B3772; outline-offset: 2px; }
    
    /* Achievements Section */
    .achievements-section {
      background: #0B3772;
      padding: 2.5rem 1rem 2rem 1rem;
      color: #fff;
      text-align: center;
    }
    .achievements-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }
    .achievements-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .achievement-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(11,55,114,0.10);
      padding: 2rem 1rem 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #0B3772;
      min-height: 180px;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.25s, transform 0.25s;
    }
    .achievement-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .achievement-number {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    .achievement-label {
      font-size: 1rem;
      font-weight: 600;
      color: #0B3772;
      opacity: 0.85;
    }
    /* Contact Section */
    .contact-section {
      background: #fff;
      padding: 2.5rem 1rem 2rem 1rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      border-radius: 0 0 24px 24px;
    }
    .contact-title {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #0B3772;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      align-items: stretch;
      justify-content: center;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0B3772;
      margin-bottom: 0.2rem;
    }
    .form-input, .form-textarea {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      color: #0B3772;
      transition: border 0.18s, box-shadow 0.18s;
    }
    .form-input:focus, .form-textarea:focus {
      border: 1.5px solid #0B3772;
      box-shadow: 0 2px 8px rgba(11,55,114,0.10);
    }
    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }
    .form-btn {
      background: #0B3772;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.9rem 2.2rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 2px 12px rgba(11,55,114,0.10);
      transition: background 0.18s, box-shadow 0.18s;
      outline: none;
      tabindex: 0;
    }
    .form-btn:hover, .form-btn:focus {
      background: #09306a;
      box-shadow: 0 4px 18px rgba(11,55,114,0.18);
    }
    .form-error {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
    }
    .contact-map {
      background: #e6e6e6;
      border-radius: 12px;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #0B3772;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
      margin-top: 2.5rem;
    }
    /* Footer */
    .footer {
      background: #0B3772;
      color: #fff;
      text-align: center;
      padding: 2rem 1rem 1rem 1rem;
      font-size: 1rem;
    }
    .footer-logos {
      margin-bottom: 0.7rem;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .footer-copyright {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    /* Responsive */
    @media (max-width: 768px) {
      .achievements-cards {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }
      .contact-section {
        grid-template-columns: 1fr;
        gap: 1.2rem;
        border-radius: 0 0 16px 16px;
      }
      .contact-map {
        margin-top: 1.2rem;
        min-height: 160px;
      }
      .footer {
        border-radius: 0 0 16px 16px;
        padding: 1.2rem 0.5rem 0.7rem 0.5rem;
      }
    }
    @media (max-width: 480px) {
      .achievements-title, .contact-title {
        font-size: 1.5rem;
      }
      .achievement-number {
        font-size: 1.3rem;
      }
      .footer-logos {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="achievements-section">
      <h1 class="achievements-title">Achievements</h1>
      <div class="achievements-cards">
        <div class="achievement-card" tabindex="0">
          <div class="achievement-number">500+</div>
          <div class="achievement-label">Students</div>
        </div>
        <div class="achievement-card" tabindex="0">
          <div class="achievement-number">120+</div>
          <div class="achievement-label">Courses</div>
        </div>
        <div class="achievement-card" tabindex="0">
          <div class="achievement-number">50+</div>
          <div class="achievement-label">Certified Instructors</div>
        </div>
        <div class="achievement-card" tabindex="0">
          <div class="achievement-number">10+</div>
          <div class="achievement-label">Years Experience</div>
        </div>
      </div>
    </section>
    <section class="contact-section" aria-labelledby="contact-title">
      <h2 class="contact-title" id="contact-title">Contact Us</h2>
      <form class="contact-form" id="contactForm" autocomplete="off" novalidate>
        <div class="form-group">
          <label for="name" class="form-label">NAME</label>
          <input type="text" id="name" name="name" class="form-input" required tabindex="1" aria-required="true">
          <div class="form-error" id="nameError"></div>
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-input" required tabindex="2" aria-required="true">
          <div class="form-error" id="emailError"></div>
        </div>
        <div class="form-group">
          <label for="phone" class="form-label">Phone</label>
          <input type="tel" id="phone" name="phone" class="form-input" tabindex="3">
          <div class="form-error" id="phoneError"></div>
        </div>
        <div class="form-group">
          <label for="message" class="form-label">MESSAGE</label>
          <textarea id="message" name="message" class="form-textarea" required tabindex="4" aria-required="true"></textarea>
          <div class="form-error" id="messageError"></div>
        </div>
        <button type="submit" class="form-btn" tabindex="5">Send</button>
      </form>
      <div class="contact-map" tabindex="6" aria-label="Map placeholder">MAP HERE</div>
    </section>
  </main>
  <footer class="footer">
    <div class="footer-logos">Social Media Logos HERE</div>
    <div class="footer-copyright">© copyrighted - 2025</div>
  </footer>
  <script>
    // Fade-up animation for achievement cards
    function revealAchievements() {
      const cards = document.querySelectorAll('.achievement-card');
      const trigger = window.innerHeight * 0.95;
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        if (rect.top < trigger) {
          card.classList.add('visible');
        }
      });
    }
    window.addEventListener('scroll', revealAchievements);
    window.addEventListener('load', revealAchievements);

    // Simple form validation
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      let valid = true;
      function setError(id, msg) {
        document.getElementById(id).textContent = msg;
      }
      function clearError(id) {
        document.getElementById(id).textContent = '';
      }
      // Name
      const name = this.name.value.trim();
      if (!name) { setError('nameError', 'Name is required.'); valid = false; } else { clearError('nameError'); }
      // Email
      const email = this.email.value.trim();
      if (!email) { setError('emailError', 'Email is required.'); valid = false; }
      else if (!/^\S+@\S+\.\S+$/.test(email)) { setError('emailError', 'Enter a valid email.'); valid = false; } else { clearError('emailError'); }
      // Phone (optional, but basic format)
      const phone = this.phone.value.trim();
      if (phone && !/^\+?[0-9\-\s]{7,}$/.test(phone)) { setError('phoneError', 'Enter a valid phone number.'); valid = false; } else { clearError('phoneError'); }
      // Message
      const message = this.message.value.trim();
      if (!message) { setError('messageError', 'Message is required.'); valid = false; } else { clearError('messageError'); }
      if (!valid) e.preventDefault();
    });
  </script>
</body>
</html>
